<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Animated Slides</title>
    <link rel="stylesheet" href="styles.css?v=b4d8p9">
</head>
<body>
    <div class="main-layout">
        <div class="container">
            <div class="slide" id="slide1">
                <h1>hello world</h1>
            </div>
            <div class="slide" id="slide2">
                <h1>I'm here!</h1>
            </div>
        </div>
        <div class="food-grid">
            <div class="food-item">
                <div class="icon">🍔</div>
                <div class="desc">Burger</div>
            </div>
            <div class="food-item">
                <div class="icon">🍕</div>
                <div class="desc">Pizza</div>
            </div>
            <div class="food-item">
                <div class="icon">🌮</div>
                <div class="desc">Tacos</div>
            </div>
            <div class="food-item">
                <div class="icon">🍣</div>
                <div class="desc">Sushi</div>
            </div>
            <div class="food-item">
                <div class="icon">🥗</div>
                <div class="desc">Salad</div>
            </div>
            <div class="food-item">
                <div class="icon">🍩</div>
                <div class="desc">Donut</div>
            </div>
        </div>
    </div>
    <script src="script.js?v=b4d8p9"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
